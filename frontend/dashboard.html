<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<link rel="stylesheet" href="style.css">

<style>

.dashboard{
width:90%;
max-width:1100px;
margin:40px auto;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
}

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,.2);
}

.card h2{
color:#5b4bff;
margin-bottom:10px;
}

.menu{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
}

.menu button{
padding:18px;
font-size:18px;
}

@media(max-width:768px){

.cards,
.menu{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div class="dashboard">

<header>

<h1>🛒 Automated Billing Dashboard</h1>

<button onclick="logout()">Logout</button>

</header>

<div class="cards">

<div class="card">
<h2>120</h2>
<p>Products</p>
</div>

<div class="card">
<h2>56</h2>
<p>Customers</p>
</div>

<div class="card">
<h2>18</h2>
<p>Today's Bills</p>
</div>

<div class="card">
<h2>₹35,650</h2>
<p>Today's Sales</p>
</div>

</div>

<div class="menu">

<button onclick="location.href='products.html'">
📦 Products
</button>

<button onclick="location.href='customers.html'">
👥 Customers
</button>

<button onclick="location.href='billing.html'">
🧾 Billing
</button>

<button onclick="location.href='reports.html'">
📈 Reports
</button>

</div>

</div>

<script>

function logout(){

window.location="login.html";

}

</script>

</body>
</html>
