<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sales Report</title>
<link rel="stylesheet" href="style.css">

<style>
.container{
width:90%;
max-width:1000px;
margin:40px auto;
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
}

.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-top:20px;
}

.card{
background:#5b4bff;
color:#fff;
padding:20px;
text-align:center;
border-radius:10px;
}

h1{
text-align:center;
}

button{
margin-top:30px;
padding:12px 20px;
background:#5b4bff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#4338ca;
}

@media(max-width:768px){
.cards{
grid-template-columns:1fr;
}
}
</style>

</head>

<body>

<div class="container">

<h1>📈 Sales Report</h1>

<div class="cards">

<div class="card">
<h2>₹1,25,000</h2>
<p>Total Revenue</p>
</div>

<div class="card">
<h2>156</h2>
<p>Total Bills</p>
</div>

<div class="card">
<h2>320</h2>
<p>Products Sold</p>
</div>

<div class="card">
<h2>85</h2>
<p>Customers</p>
</div>

<div class="card">
<h2>₹35,650</h2>
<p>Today's Sales</p>
</div>

<div class="card">
<h2>Laptop</h2>
<p>Top Selling Product</p>
</div>

</div>

<center>

<button onclick="window.print()">
🖨 Print Report
</button>

<button onclick="location.href='dashboard.html'">
⬅ Dashboard
</button>

</center>

</div>

</body>
</html>
